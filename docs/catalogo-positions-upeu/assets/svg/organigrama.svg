  <text x="370" y="376" text-anchor="middle" font-size="8" fill="#1B5E20">Jefe Infra TI · Jefe Desa. SI · Jefe Soporte</text>
  <line x1="311" y1="346" x2="370" y2="360" stroke="#388E3C" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== NIVEL 4C: VR Bienestar ===== -->
  <rect x="635" y="316" width="185" height="30" rx="5" fill="#EF6C00"/>
  <text x="728" y="328" class="node-label" style="font-size:9px">Dir. Universidad Saludable</text>
