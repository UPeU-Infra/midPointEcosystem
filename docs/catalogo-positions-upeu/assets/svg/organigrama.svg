  <text x="80" y="372" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">5 Facultades (Decanos)</text>
  <rect x="10" y="378" width="250" height="28" rx="4" fill="#BBDEFB"/>
  <text x="135" y="394" text-anchor="middle" font-size="8" fill="#0D47A1">FIA · FACTEO · FACISAL · FACIHED · FCE</text>
