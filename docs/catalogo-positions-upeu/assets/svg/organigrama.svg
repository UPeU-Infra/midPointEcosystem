  <rect x="840" y="262" width="110" height="22" rx="4" fill="#78909C"/>
  <text x="895" y="275" text-anchor="middle" font-size="8" fill="#fff">Auditor Interno</text>
  <line x1="585" y1="182" x2="840" y2="191" stroke="#78909C" stroke-width="1" stroke-dasharray="4,3" fill="none"/>

