  <text x="283" y="494" class="node-sub">POS-DIR-GENERAL-CAMPUS-LM</text>

  <rect x="390" y="470" width="165" height="32" rx="5" fill="#5C6BC0"/>
  <text x="473" y="482" class="node-label">Campus Juliaca</text>
  <text x="473" y="494" class="node-sub">POS-DIR-GENERAL-CAMPUS-JU</text>

  <rect x="580" y="470" width="165" height="32" rx="5" fill="#5C6BC0"/>
  <text x="663" y="482" class="node-label">Campus Tarapoto</text>
  <text x="663" y="494" class="node-sub">POS-DIR-GENERAL-CAMPUS-TA</text>

