  <!-- ===== ASESORÍA Rectorado ===== -->
  <text x="835" y="172" text-anchor="middle" font-size="9" fill="#555" font-weight="600">Asesoría / Control</text>
  <rect x="840" y="178" width="110" height="22" rx="4" fill="#78909C"/>
  <text x="895" y="191" text-anchor="middle" font-size="8" fill="#fff">Defensor Universitario</text>
  <rect x="840" y="206" width="110" height="22" rx="4" fill="#78909C"/>
