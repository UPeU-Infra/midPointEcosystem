<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <style>
      text { font-family: Inter, system-ui, sans-serif; }
      .node-label { font-size: 10px; fill: #fff; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .node-sub { font-size: 8px; fill: rgba(255,255,255,0.85); text-anchor: middle; dominant-baseline: middle; }
      .legend-text { font-size: 11px; fill: #333; dominant-baseline: middle; }
      .line { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .line-thin { stroke: #bbb; stroke-width: 1; fill: none; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="680" fill="#f8f9fa" rx="8"/>
  <text x="480" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#003366">Organigrama Institucional — Universidad Peruana Unión (Res. 0001-2026/UPeU-AU)</text>

  <!-- ===== NIVEL 0: AU ===== -->
  <rect x="390" y="38" width="180" height="38" rx="6" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="480" y="53" class="node-label">Asamblea Universitaria</text>
  <text x="480" y="66" class="node-sub">Órgano máximo</text>

  <!-- ===== NIVEL 1: CU ===== -->
  <rect x="390" y="100" width="180" height="38" rx="6" fill="#003366" filter="url(#shadow)"/>
  <text x="480" y="115" class="node-label">Consejo Universitario</text>
  <text x="480" y="128" class="node-sub">Órgano de gobierno</text>

  <!-- AU → CU -->
  <line x1="480" y1="76" x2="480" y2="100" class="line"/>

  <!-- ===== NIVEL 2: RECTOR ===== -->
  <rect x="375" y="162" width="210" height="40" rx="6" fill="#003366" filter="url(#shadow)"/>
  <text x="480" y="177" class="node-label">Rector</text>
  <text x="480" y="190" class="node-sub">POS-RECTOR · Murillo Antón, W.S.</text>

  <!-- CU → Rector -->
  <line x1="480" y1="138" x2="480" y2="162" class="line"/>

  <!-- ===== NIVEL 3: VR + SecGen ===== -->
  <!-- VR Académico -->
  <rect x="50" y="238" width="185" height="42" rx="6" fill="#1565C0" filter="url(#shadow)"/>
  <text x="143" y="254" class="node-label">VR Académico</text>
  <text x="143" y="268" class="node-sub">POS-VICE-RECTOR-ACAD</text>

