  <rect x="75" y="624" width="14" height="14" rx="3" fill="#003366"/>
  <text x="93" y="634" class="legend-text">Gobierno central</text>
  <rect x="195" y="624" width="14" height="14" rx="3" fill="#1565C0"/>
  <text x="213" y="634" class="legend-text">VR Académico</text>
  <rect x="310" y="624" width="14" height="14" rx="3" fill="#2E7D32"/>
  <text x="328" y="634" class="legend-text">VR Administrativo</text>
  <rect x="445" y="624" width="14" height="14" rx="3" fill="#E65100"/>
  <text x="463" y="634" class="legend-text">VR Bienestar</text>
  <rect x="545" y="624" width="14" height="14" rx="3" fill="#5C6BC0"/>
  <text x="563" y="634" class="legend-text">Campus</text>
  <rect x="615" y="624" width="14" height="14" rx="3" fill="#00796B"/>
  <text x="633" y="634" class="legend-text">Biblioteca/CRAI</text>
  <rect x="715" y="624" width="14" height="14" rx="3" fill="#78909C"/>
  <text x="733" y="634" class="legend-text">Asesoría/Control</text>

  <text x="480" y="660" text-anchor="middle" font-size="9" fill="#888">Fuente: Resolución 0001-2026/UPeU-AU — Organigrama Institucional UPeU. Elaborado para Proyecto IGA 2026.</text>
</svg>
