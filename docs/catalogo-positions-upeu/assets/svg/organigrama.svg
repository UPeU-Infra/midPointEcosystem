  <rect x="255" y="238" width="185" height="42" rx="6" fill="#2E7D32" filter="url(#shadow)"/>
  <text x="348" y="254" class="node-label">VR Administrativo</text>
  <text x="348" y="268" class="node-sub">POS-VICE-RECTOR-ADM</text>

